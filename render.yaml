services:
  - type: web
    name: nlp-gymtracker
    env: python
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - backend/**
        - frontend/**
        - requirements.txt
    buildCommand: |
      cd frontend && npm install && npm run build
      cd .. && pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PYTHONPATH
        value: .
