services:
  # Backend API
  - type: web
    name: gym-tracker-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0

  # Frontend (Static Site)
  - type: web
    name: gym-tracker-ui
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Proxy API requests to the backend
      - type: rewrite
        source: /api/*
        destination: https://gym-tracker-api.onrender.com/api/*
      # Single Page App routing: fallback to index.html
      - type: rewrite
        source: /*
        destination: /index.html
